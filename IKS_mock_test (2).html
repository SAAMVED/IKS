    { q: "A central ethical teaching consistently emphasized in the Jataka tales is:", opts: ["Material prosperity as the highest goal","Supremacy of royal authority","Karma and moral consequence of actions","Ascetic withdrawal from society"], ans: 2, reason: "The Jataka tales consistently teach that one's karma (actions) has moral consequences across lifetimes." },
    { q: "In ancient Indian courts, Sabhyas were mainly responsible for:", opts: ["Executing punishments","Assisting judges in judicial decision-making","Collecting revenue for the king","Recording land grants"], ans: 1, reason: "Sabhyas were court members who assisted judges in evaluating evidence and delivering judgments." },

    { q: "In Indian philosophical tradition, the term Darshan primarily refers to:", opts: ["Logical analysis of sensory data","Seeing or realizing the Ultimate Reality through lived experience","Experimental study of mind and behaviour","Ethical rules governing social conduct"], ans: 1, reason: "Darshan means direct vision or lived realization of ultimate truth, not mere intellectual analysis." },
    { q: "According to Rigvedic psychology, mental health is best understood as an integration of:", opts: ["Consciousness, intellect, and ego","Mind (Manas), body, and society","Manas (mind), Prana (vital energy), and Vak (speech)","Perception, memory, and imagination"], ans: 2, reason: "Rigvedic psychology integrates Manas (mind), Prana (vital force), and Vak (speech) for holistic mental well-being." },
    { q: "The four states of mind (Avasthas) described in the Upanishads include all the following EXCEPT:", opts: ["Jagrat (waking)","Svapna (dreaming)","Samkalpa (volitional state)","Sushupti (deep sleep)"], ans: 2, reason: "The four Avasthas are Jagrat, Svapna, Sushupti, and Turiya — Samkalpa (volition) is not an Avastha." },
    { q: "In Srimad Bhagavad Gita, Arjuna's trembling body, confusion, and fear is considered as:", opts: ["A symbolic poetic exaggeration","A moral dilemma without psychological meaning","An early description of anxiety and depressive symptoms","A physical illness unrelated to mental state"], ans: 2, reason: "Arjuna's symptoms — trembling, confusion, despair — closely match clinical descriptions of acute anxiety disorder." },
    { q: "According to Ayurveda, which Dosha is psychologically associated with creativity, communication, and quickness of thought?", opts: ["Kapha","Pitta","Vata","Tamas"], ans: 2, reason: "Vata dosha governs nervous system functions including creativity, quick thinking, and speed of communication." },
    { q: "The concept of Scientific Temper, as mentioned in the Indian Constitution, is included under:", opts: ["Fundamental Rights","Directive Principles of State Policy","Fundamental Duties (Article 51A(h))","Preamble of the Constitution"], ans: 2, reason: "Scientific Temper is listed as a Fundamental Duty of citizens under Article 51A(h) of the Constitution." },
    { q: "According to Ashtavaidya philosophy, disease occurrence can be reduced by controlling:", opts: ["Medicines only","Climate","Aharam and Viharam (diet and lifestyle)","Surgical intervention"], ans: 2, reason: "Ashtavaidya holds that most diseases can be prevented by regulating proper diet (Aharam) and lifestyle (Viharam)." },
    { q: "Panchakarma in Ashtavaidya treatment mainly refers to:", opts: ["Diagnostic techniques","Preventive vaccination","Purificatory therapies","Emergency procedures"], ans: 2, reason: "Panchakarma consists of five purificatory procedures to detoxify the body in Ashtavaidya and Ayurveda." },

    { q: "'Ayurgenomics' refers to:", opts: ["Herbal drug preparation","Ancient surgical methods","Integration of genomics with Ayurveda","Digital marketing of Ayurveda"], ans: 2, reason: "Ayurgenomics combines Ayurvedic Prakriti (constitution) analysis with modern genomics for personalized medicine." },

  { label: "Week 9", questions: [
    { q: "The word 'ethics' is derived from which language?", opts: ["Latin","Spanish","Greek","Hebrew"], ans: 2, reason: "Ethics derives from the Greek word 'ethos' meaning character, habit, or customary conduct." },
    { q: "Which branch of ethics uses psychology, sociology, and anthropology to describe how people behave morally?", opts: ["Normative ethics","Applied ethics","Meta-ethics","Descriptive ethics"], ans: 3, reason: "Descriptive ethics uses social sciences to study and describe actual moral behavior without prescribing norms." },
    { q: "Which of the following correctly categorizes values of Right Conduct?", opts: ["Self-help skills, Descriptive skills, Normative skills","Self-help skills, Social skills, Ethical skills","Ethical skills, Applied skills, Meta-ethics","Descriptive ethics, Normative ethics, Applied ethics"], ans: 1, reason: "Right Conduct encompasses self-help skills (personal), social skills (interpersonal), and ethical skills (moral)." },

    { q: "Why is Darshan described as 'Atma-Anubhuti' rather than 'Atma-Gyan'?", opts: ["Knowledge is rejected in Indian philosophy","Philosophy aims at realization, not merely conceptual knowledge","Intellectual understanding is considered inferior to rituals","Liberation is possible only through sensory experiences"], ans: 1, reason: "Darshan as Atma-Anubhuti means direct self-realization — going beyond theoretical Atma-Gyan (knowledge about self)." },
    { q: "The fundamental criterion distinguishing Astika and Nastika schools is based on:", opts: ["Belief or disbelief in God","Acceptance or rejection of rebirth","Acceptance or rejection of the authority of the Vedas","Emphasis on ritual versus meditation"], ans: 2, reason: "Astika schools accept Vedic authority; Nastika schools (Buddhism, Jainism, Charvaka) reject it." },
    { q: "Samkhya philosophy is described as Nirisvara Vada because it:", opts: ["Rejects the existence of both soul and matter","Accepts God only as a moral regulator","Considers liberation possible only through devotion","Explains creation through Prakriti without a creator God"], ans: 3, reason: "Samkhya is atheistic — it explains creation through Purusha and Prakriti interaction, without a creator God." },
    { q: "The concept of 'Rit' in Vedic thought is best understood as:", opts: ["A ritualistic practice prescribed by priests","A legal code enforced by rulers","A cosmic moral order governing the universe","A doctrine of rebirth and liberation"], ans: 2, reason: "Rit (Rita) in the Rigveda is the universal cosmic and moral order that governs both nature and human conduct." },
    { q: "In Indian philosophical tradition, Darshan is distinguished from Western philosophy mainly because it:", opts: ["Emphasizes realization of ultimate reality through lived experience","Limits inquiry to empirical and scientific knowledge","Deals philosophy purely as an intellectual profession","Rejects reason in favour of blind faith"], ans: 0, reason: "Indian Darshan seeks liberation through direct experiential realization, unlike Western philosophy's intellectual approach." },
    { q: "Which of the following schools is classified under non-Vedic (Nastika) Indian philosophy?", opts: ["Nyaya","Vedanta","Carvaka","Mimamsa"], ans: 2, reason: "Carvaka/Lokayata is a Nastika (non-Vedic) school that rejects the Vedas, rebirth, and the soul." },
    { q: "The primary epistemological position of the Carvaka school is that valid knowledge is obtained only through:", opts: ["Inference (Anumana)","Testimony (Sabda)","Comparison (Upamana)","Perception (Pratyaksha)"], ans: 3, reason: "Carvaka is strict empiricist — only direct sensory perception (Pratyaksha) is a valid source of knowledge." },
    { q: "Which of the following beliefs is explicitly rejected by the Carvaka philosophy?", opts: ["Existence of the external world","Authority of the Vedas","Pleasure as the goal of life","Reality of matter"], ans: 1, reason: "Carvaka explicitly rejects the authority of the Vedas, considering them fraudulent and irrelevant to life." },
    { q: "Which of the following best represents the Upanishadic shift from Vedic ritualism?", opts: ["Emphasis on elaborate sacrifices","Supremacy of Karmakanda","Focus on Jnana, meditation, and contemplation","Expansion of polytheistic worship"], ans: 2, reason: "The Upanishads shifted from ritual-heavy Karma-kanda to philosophical inquiry, self-knowledge, and meditation." },
    { q: "Which school of Philosophy is attributed to Brihaspati?", opts: ["Advaita","Lokayata (Carvaka)","Sunyavad","Syadvad"], ans: 1, reason: "Brihaspati is traditionally cited as the legendary founder of the Lokayata (Carvaka) materialist school." },
    { q: "The famous Carvaka dictum 'Yavajjivet sukham jivet' primarily emphasizes:", opts: ["Enjoyment of life here and now","Ascetic discipline","Ritual purity","Accumulation of spiritual merit"], ans: 0, reason: "'Live joyfully while you live' is Carvaka's motto — maximizing sensory pleasure in the present life." },

  { label: "Week 10", questions: [

    { q: "In Vishishtadvaita, the relationship between Jiva (Soul) and Brahman is:", opts: ["Complete identity with no distinction","Distinct but inseparable like body and soul","Totally separate entities","Illusory"], ans: 1, reason: "In Vishishtadvaita, Jiva and Brahman are real and distinct, yet inseparable — like body and soul." },

    { q: "Whose childhood name was Narendranath Dutta?", opts: ["Rabindranath Tagore","Adi Shankaracharya","Mahavir Jain","Swami Vivekananda"], ans: 3, reason: "Swami Vivekananda was born as Narendranath Dutta in Calcutta in 1863." },
  ]},
  { label: "Week 11", questions: [
    { q: "Cinema is described primarily as:", opts: ["A form of literary criticism","A visual storytelling medium combining multiple art forms","A purely entertainment-based industry","A technical tool for documentation"], ans: 1, reason: "Cinema uniquely combines film, music, drama, and visual art into a powerful multi-art storytelling medium." },

    { q: "The Shiksha Vedanga was mainly concerned with:", opts: ["Sentence meaning and interpretation","Correct pronunciation and phonetics","Poetic imagination","Astronomical calculations"], ans: 1, reason: "Shiksha Vedanga is dedicated to the science of correct Vedic pronunciation, phonetics, and phonology." },
    { q: "According to Bhartrihari's Sphota theory, the meaning in language:", opts: ["Emerges letter by letter","Depends only on grammatical rules","Appears suddenly as a complete cognitive unit","Is fixed and context-independent"], ans: 2, reason: "Bhartrihari's Sphota theory holds that meaning flashes as a whole, indivisible cognitive unit, not letter by letter." },

    { q: "Which is a characteristic feature of colonial school and college education in India?", opts: ["Integration of moral, spiritual, and vocational learning","Emphasis on rote learning and examination-oriented system","Community-based and experiential learning","Teacher autonomy and curriculum flexibility"], ans: 1, reason: "Colonial education focused on memorization and examinations to produce clerks, not independent thinkers." },

let answered = 0, correctCount = 0;
const states = {};

function render() {
  const body = document.getElementById('quiz-body');
  let html = '';
  let qNum = 0;
  const letters = ['A','B','C','D'];
  weeks.forEach((week, wi) => {
    html += `<div class="week-label">${week.label}</div>`;
    week.questions.forEach((q, qi) => {
      qNum++;
      const key = `${wi}-${qi}`;
      const state = states[key] || {};
      let optsHtml = q.opts.map((opt, oi) => {
        let cls = 'option';
        if (state.revealed) {
          if (oi === q.ans) cls += ' correct';
          else if (state.chosen === oi && oi !== q.ans) cls += ' wrong';
        } else if (state.chosen === oi) cls += ' selected';
        return `<div class="${cls}" onclick="choose(${wi},${qi},${oi})"><span class="opt-letter">${letters[oi]}</span>${opt}</div>`;
      }).join('');
      let ansBox = state.revealed
        ? `<div class="answer-box" style="display:block">✓ Answer: ${letters[q.ans]}. ${q.opts[q.ans]}<div class="reason">${q.reason}</div></div>`
        : '';
      html += `<div class="q-card">
        <div class="q-num">Q${qNum}</div>
        <div class="q-text">${q.q}</div>
        <div class="options">${optsHtml}</div>
        <button class="reveal-btn" onclick="reveal(${wi},${qi})">${state.revealed ? 'Hide answer' : 'Show answer & reason'}</button>
        ${ansBox}
      </div>`;
    });
  });
  body.innerHTML = html;
  document.getElementById('answered').textContent = answered;
  document.getElementById('correct-count').textContent = correctCount;
  document.getElementById('score-pct').textContent = answered ? Math.round(correctCount / answered * 100) + '%' : '0%';
}

function choose(wi, qi, oi) {
  const key = `${wi}-${qi}`;
  if (states[key] && states[key].chosen !== undefined) return;
  const q = weeks[wi].questions[qi];
  if (!states[key]) states[key] = {};
  answered++;
  if (oi === q.ans) correctCount++;
  states[key].chosen = oi;
  states[key].revealed = true;
  render();
}

function reveal(wi, qi) {
  const key = `${wi}-${qi}`;
  if (!states[key]) states[key] = {};
  states[key].revealed = !states[key].revealed;
  render();
}

function resetAll() {
  Object.keys(states).forEach(k => delete states[k]);
  answered = 0; correctCount = 0;
  render();
}

render();
</script>
