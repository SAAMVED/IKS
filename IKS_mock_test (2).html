let answered = 0, correctCount = 0;
const states = {};

function render() {
  const body = document.getElementById('quiz-body');
  let html = '';
  let qNum = 0;
  const letters = ['A','B','C','D'];
  weeks.forEach((week, wi) => {
    html += `<div class="week-label">${week.label}</div>`;
    week.questions.forEach((q, qi) => {
      qNum++;
      const key = `${wi}-${qi}`;
      const state = states[key] || {};
      let optsHtml = q.opts.map((opt, oi) => {
        let cls = 'option';
        if (state.revealed) {
          if (oi === q.ans) cls += ' correct';
          else if (state.chosen === oi && oi !== q.ans) cls += ' wrong';
        } else if (state.chosen === oi) cls += ' selected';
        return `<div class="${cls}" onclick="choose(${wi},${qi},${oi})"><span class="opt-letter">${letters[oi]}</span>${opt}</div>`;
      }).join('');
      let ansBox = state.revealed
        ? `<div class="answer-box" style="display:block">✓ Answer: ${letters[q.ans]}. ${q.opts[q.ans]}<div class="reason">${q.reason}</div></div>`
        : '';
      html += `<div class="q-card">
        <div class="q-num">Q${qNum}</div>
        <div class="q-text">${q.q}</div>
        <div class="options">${optsHtml}</div>
        <button class="reveal-btn" onclick="reveal(${wi},${qi})">${state.revealed ? 'Hide answer' : 'Show answer & reason'}</button>
        ${ansBox}
      </div>`;
    });
  });
  body.innerHTML = html;
  document.getElementById('answered').textContent = answered;
  document.getElementById('correct-count').textContent = correctCount;
  document.getElementById('score-pct').textContent = answered ? Math.round(correctCount / answered * 100) + '%' : '0%';
}

function choose(wi, qi, oi) {
  const key = `${wi}-${qi}`;
  if (states[key] && states[key].chosen !== undefined) return;
  const q = weeks[wi].questions[qi];
  if (!states[key]) states[key] = {};
  answered++;
  if (oi === q.ans) correctCount++;
  states[key].chosen = oi;
  states[key].revealed = true;
  render();
}

function reveal(wi, qi) {
  const key = `${wi}-${qi}`;
  if (!states[key]) states[key] = {};
  states[key].revealed = !states[key].revealed;
  render();
}

function resetAll() {
  Object.keys(states).forEach(k => delete states[k]);
  answered = 0; correctCount = 0;
  render();
}

render();
</script>
